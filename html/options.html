<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html lang="zh">
<head>
    <title>
        追剧助手选项设置
    </title>
    <meta name="author" content="zsdroid">
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <script src="../js/jquery.min.js" type="text/javascript"></script>
    <link rel="stylesheet" type="text/css" href="../js/bootstrap-4.5.0-dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="../js/options.css">
    <script type="text/javascript" src="../js/bootstrap-4.5.0-dist/js/bootstrap.min.js"></script>
    <script type="module" src="../js/helper.js"></script>
    <script type="text/javascript" src="../js/vue@2.6.11.js"></script>
</head>
<body>
<div id="content">
    <ul class="nav nav-tabs" id="tab-nav" role="tablist">
        <li class="nav-item">
            <a class="nav-link active" href="#update-option-section" role="tab" data-toggle="tab">选项</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="#title-matching-rules" role="tab" data-toggle="tab">标题匹配</a>
        </li>
    </ul>
    <div class="tab-content">
        <div class="tab-pane active" style="margin-top: 10px;" id="update-option-section">
            <form class="formOptions" action="">
                <h6>ui模式</h6>
                <div class="update-option-indiv">
                    <div class="radio-inline">
                        <label> <input type="radio" name="uiMode" value="list" checked> 列表
                            <small class="form-text text-muted">
                                可展示的内容多
                            </small>
                        </label>
                    </div>
                    <div class="radio-inline">
                        <label> <input type="radio" name="uiMode" value="card"> 卡片
                            <small class="form-text text-muted">
                                可展示的标题长
                            </small>
                        </label>
                    </div>
                </div>

                <button type="button" class="btn btn-success save-option" @click="saveOption">保存</button>
            </form>
        </div>
        <div class="tab-pane" id="title-matching-rules">
            <div>
                <button type="button" class="btn btn-primary" @click="addSiteRegular">新增规则</button>
            </div>
            <table class="table">
                <thead>
                <tr>
                    <th>站点规则</th>
                    <th>原始标题</th>
                    <th>新标题</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr v-for="item in siteRegular.defaultSiteRegulars">
                    <td>{{ item.siteReg }}</td>
                    <td>{{ item.titleReg }}</td>
                    <td>{{ item.newTitleReg }}</td>
                    <td>-</td>
                </tr>
                <tr v-for="(item,index) in siteRegular.customSiteRegulars">
                    <td>{{ item.siteReg }}</td>
                    <td>{{ item.titleReg }}</td>
                    <td>{{ item.newTitleReg }}</td>
                    <td><a href="#" @click="editSiteRegular(index,item)">编辑</a></td>
                </tr>
                </tbody>
            </table>

            <form :hidden="!editSite.isEdit" action="#">
                <div class="form-group">
                    <label>站点规则</label>
                    <input type="text" class="form-control" v-model="editSite.currentSiteRegular.siteReg">
                    <label>原始标题</label>
                    <input type="text" class="form-control" v-model="editSite.currentSiteRegular.titleReg">
                    <label>新标题</label>
                    <input type="text" class="form-control" v-model="editSite.currentSiteRegular.newTitleReg">
                </div>
                <button type="button" class="btn btn-success save-option" @click="saveSiteRegular">保存</button>
                <button type="button" class="btn btn-secondary save-option" @click="cancelSiteRegular">取消</button>
            </form>
        </div>
    </div>
</div>
</body>
<script src="../js/options.js" type="module"></script>
</html>
