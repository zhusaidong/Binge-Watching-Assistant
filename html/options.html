<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html lang="zh">
<head>
    <title>
        追剧助手选项设置
    </title>
    <meta name="author" content="zsdroid">
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <script src="../js/jquery.min.js" type="text/javascript"></script>
    <link rel="stylesheet" type="text/css" href="../js/bootstrap-4.5.0-dist/css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="../js/options.css">
    <script type="text/javascript" src="../js/bootstrap-4.5.0-dist/js/bootstrap.min.js"></script>
    <script type="application/javascript" src="../js/vue@2.6.11.js"></script>
</head>
<body>
<div id="content">
    <ul class="nav nav-tabs" id="tab-nav" role="tablist">
        <li class="nav-item">
            <a class="nav-link active" href="#update-option-section" role="tab" data-toggle="tab">选项</a>
        </li>
        <li class="nav-item" style="display: none;">
            <a class="nav-link" href="#watched-bookmark" role="tab" data-toggle="tab">完结项</a>
        </li>
    </ul>
    <div class="tab-content">
        <div class="tab-pane active" style="margin-top: 10px;" id="update-option-section">
            <form class="formOptions" action="">
                <h6>ui模式</h6>
                <div class="update-option-indiv">
                    <div class="radio-inline">
                        <label> <input type="radio" name="uiMode" value="list" checked> 列表
                            <small class="form-text text-muted">
                                可展示的内容多
                            </small>
                        </label>
                    </div>
                    <div class="radio-inline">
                        <label> <input type="radio" name="uiMode" value="card"> 卡片
                            <small class="form-text text-muted">
                                可展示的标题长
                            </small>
                        </label>
                    </div>
                </div>
                <button type="button" class="btn btn-success save-option" @click="saveOption">保存</button>
            </form>
        </div>
        <div class="tab-pane" id="watched-bookmark">

        </div>
    </div>
</div>
</body>
<script src="../js/options.js" type="text/javascript"></script>
</html>
