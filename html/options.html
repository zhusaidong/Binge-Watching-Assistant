<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html lang="zh">
	<head>
		<title>
			追剧助手选项设置
		</title>
		<meta name="author" content="zsdroid">
		<meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
		<script src="../js/jquery.min.js" type="text/javascript"></script>
		<link rel="stylesheet" type="text/css" href="../js/bootstrap.min.css">
		<link rel="stylesheet" type="text/css" href="../js/options.css">
		<script type="text/javascript" src="../js/bootstrap.min.js"></script>
		<script src="../js/options.js" type="text/javascript"></script>
	</head>
	<body>
		<div id="content">
			<ul class="nav nav-tabs" id="tab-nav">
				<li><a href="#update-option-section" data-toggle="tab">选项</a></li>
				<li><a href="#watched-bookmark" data-toggle="tab">完结</a></li>
			</ul>
			<div class="tab-content">
				<div class="tab-pane" id="update-option-section">
					<div class="update-option-div">
						<h3>更新模式</h3>
						<div class="update-option-indiv">
							<div class="radio-inline">
								<label> <input type="radio" name="updateMode" value="auto" checked> 自动 </label>
							</div>
							<div class="radio-inline">
								<label> <input type="radio" name="updateMode" value="manual"> 手动 </label>
							</div>
						</div>
					</div>
					<div class="update-option-div">
						<h3>ui模式</h3>
						<div class="update-option-indiv">
							<div class="radio-inline">
								<label> <input type="radio" name="uiMode" value="list" checked> 列表 </label>
							</div>
							<div class="radio-inline">
								<label> <input type="radio" name="uiMode" value="card"> 卡片 </label>
							</div>
						</div>
					</div>
					<button class="btn btn-success save-option">保存</button>
				</div>
				<div class="tab-pane" id="watched-bookmark">
				
				</div>
			</div>
		</div>
	</body>
</html>
