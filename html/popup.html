<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<html lang="zh">
<head>
    <title>
        追剧助手
    </title>
    <meta name="author" content="zsdroid">
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <script src="../js/jquery.min.js" type="text/javascript"></script>
    <link rel="stylesheet" type="text/css" href="../js/bootstrap-4.5.0-dist/css/bootstrap.min.css">
    <script src="../js/bootstrap-4.5.0-dist/js/bootstrap.min.js" type="text/javascript"></script>
    <script src="../js/jquery-ui.min.js" type="text/javascript"></script>
    <script type="application/javascript" src="../js/vue@2.6.11.js"></script>
    <style type="text/css">
        ul {
            list-style-type: none;
            padding: 0;
            margin: 0 0 10px;
        }

        .bookmark-list {
            width: 600px;
        }

        .link {
            text-decoration: none;
            word-break: break-all;
        }

        .add-btn {
            margin-left: 430px;
            margin-bottom: 15px;
        }

        .save-btn {
            display: none;
        }

        .cancel-btn {
            display: none;
        }

        .text-change {
            display: none;
            width: 70%;
        }

        .website-icon {
            background-repeat: no-repeat;
            height: 16px;
            width: 16px;
        }
    </style>
    <style type="text/css">
        .bookmark-text{
            font-size: 14px;
        }

        .bookmark > .bookmark-text {
            padding-left: 0;
            white-space: nowrap;
            text-overflow: ellipsis;
            overflow: hidden;
            word-break: break-all;
        }

        .bookmark > .bookmark-btn > i {
            cursor: pointer;
        }

        table {
            min-height: 20px;
            line-height: 20px;
            table-layout: fixed;
        }
    </style>
</head>
<body>
<div class="bookmark-list">
    <span>追剧书签:</span>
    <div class="add-btn">
        <button type="button" class="btn btn-primary btn-sm" @click="addBtn">添加追剧</button>
        <button type="button" class="btn btn-primary btn-sm" @click="addSeparator">添加分隔线</button>
    </div>

    <template v-if="uiMode === 'list'">
        <table class="table">
            <tbody class="draggable-range">
            <tr class="bookmark draggable-element"
                :data-id="bookmark.id"
                :key="bookmark.id"
                v-for="(bookmark,index) in bookmarks">

                <td class="bookmark-no" style="width: 13%;">
                    {{index + 1}}.
                    <img class="website-icon" :src="'chrome://favicon/size/16@1x/' + bookmark.url" alt="">
                </td>
                <td class="bookmark-text">
                    <!-- 是分隔线 -->
                    <template
                            v-if="bookmark.url.indexOf('chrome://bookmarks') == 0 && bookmark.title.indexOf('-----') == 0">
                        <span class="bookmark-a link" :title="bookmark.url">{{bookmark.title}}</span>
                    </template>
                    <template v-else>
                        <a class="link" href="#" @click="linkBtn">
                            <span class="bookmark-a" :title="bookmark.url">{{bookmark.title}}</span>
                        </a>
                    </template>
                    <input type="text" class="form-control text-change" style="width:100%" v-model="bookmark.title">
                </td>
                <td class="bookmark-btn" style="width: 21%;">
                    <button type="button" class="btn btn-success change-btn btn-sm" @click="changeBtn">编辑
                    </button>
                    <button type="button" class="btn btn-success save-btn btn-sm" @click="saveBtn">保存
                    </button>
                    <button type="button" class="btn btn-danger cancel-btn btn-sm" @click="cancelBtn">
                        取消
                    </button>
                    <button type="button" class="btn btn-danger delete-btn btn-sm" @click="deleteBtn">
                        删除
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </template>

    <template v-if="uiMode === 'card'">
        <div class="table draggable-range">
            <div class="bookmark border-1 mb-sm-n1 mt-sm-n1 draggable-element"
                 :data-id="bookmark.id"
                 :key="bookmark.id"
                 v-for="(bookmark,index) in bookmarks">

                <div class="card-body border d-flex justify-content-start">
                    <div class="bookmark-no" style="width:13%">
                        {{index + 1}}.
                        <img class="website-icon" :src="'chrome://favicon/size/16@1x/' + bookmark.url" alt="">
                    </div>
                    <div class="bookmark-text align-self-center">
                        <!-- 是分隔线 -->
                        <template
                                v-if="bookmark.url.indexOf('chrome://bookmarks') == 0 && bookmark.title.indexOf('-----') == 0">
                            <span class="bookmark-a link" :title="bookmark.url">{{bookmark.title}}</span>
                        </template>
                        <template v-else>
                            <a class="link" href="#" @click="linkBtn">
                                <span class="bookmark-a" :title="bookmark.url">{{bookmark.title}}</span>
                            </a>
                        </template>
                        <input type="text" class="form-control text-change" style="width:100%" :value="bookmark.title">
                    </div>
                </div>
                <div class="bookmark-btn card-footer">
                    <button type="button" class="btn btn-success change-btn btn-sm" @click="changeBtn">编辑
                    </button>
                    <button type="button" class="btn btn-success save-btn btn-sm" @click="saveBtn">保存
                    </button>
                    <button type="button" class="btn btn-danger cancel-btn btn-sm" @click="cancelBtn">
                        取消
                    </button>
                    <button type="button" class="btn btn-danger delete-btn btn-sm" @click="deleteBtn">
                        删除
                    </button>
                </div>
            </div>
        </div>
    </template>
</div>
</body>
<script src="../js/popup.js" type="module"></script>
</html>
